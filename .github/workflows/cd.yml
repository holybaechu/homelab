name: cd

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cd.yml"
      - "apps/**"
      - "infra/**"
      - "requirements-deploy.txt"
      - "scripts/ci/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: prod
    env:
      TF_IN_AUTOMATION: "1"
      ANSIBLE_CONFIG: infra/ansible/ansible.cfg
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Connect Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          version: "1.98.4"
          args: --accept-dns=false
          ping: ${{ vars.PVE_TAILSCALE_IP }}

      - name: Install tooling
        run: ./scripts/ci/install-tools.sh

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: ./scripts/ci/configure-ssh.sh

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infra/ansible/requirements.yml

      - name: Validate and write Ansible service secrets
        env:
          ANSIBLE_EXTRA_VARS_PATH: ${{ runner.temp }}/ansible-extra-vars.json
          CLOUDFLARE_TRAEFIK_TOKEN: ${{ secrets.CLOUDFLARE_TRAEFIK_TOKEN || secrets.CLOUDFLARE_CADDY_TOKEN }}
          CLOUDFLARE_DDNS_TOKEN: ${{ secrets.CLOUDFLARE_DDNS_TOKEN }}
          ADGUARD_ADMIN_USERNAME: ${{ vars.ADGUARD_ADMIN_USERNAME }}
          ADGUARD_ADMIN_PASSWORD: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          PROTON_WIREGUARD_PRIVATE_KEY: ${{ secrets.PROTON_WIREGUARD_PRIVATE_KEY }}
          QBITTORRENT_WEBUI_PASSWORD: ${{ secrets.QBITTORRENT_WEBUI_PASSWORD }}
          HERMES_DISCORD_BOT_TOKEN: ${{ secrets.HERMES_DISCORD_BOT_TOKEN }}
          HERMES_DISCORD_ALLOWED_USERS: ${{ secrets.HERMES_DISCORD_ALLOWED_USERS }}
          HERMES_DISCORD_HOME_CHANNEL: ${{ secrets.HERMES_DISCORD_HOME_CHANNEL }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          HONCHO_API_KEY: ${{ secrets.HONCHO_API_KEY }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          COPYPARTY_USERS_JSON: ${{ secrets.COPYPARTY_USERS_JSON }}
          BACKUP_RESTIC_REPOSITORY: ${{ secrets.BACKUP_RESTIC_REPOSITORY }}
          BACKUP_RESTIC_PASSWORD: ${{ secrets.BACKUP_RESTIC_PASSWORD }}
          BACKUP_AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID || secrets.TOFU_STATE_ACCESS_KEY_ID }}
          BACKUP_AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY || secrets.TOFU_STATE_SECRET_ACCESS_KEY }}
        run: python3 scripts/ci/write_ansible_extra_vars.py "${ANSIBLE_EXTRA_VARS_PATH}"

      - name: Prepare one-time lowest-ID cutover
        env:
          LOW_ID_CUTOVER_CONFIRMED: ${{ vars.LOW_ID_CUTOVER_CONFIRMED }}
          ANSIBLE_EXTRA_VARS_PATH: ${{ runner.temp }}/ansible-extra-vars.json
        run: >-
          ansible-playbook -i infra/ansible/inventory/prod/hosts.yml
          infra/ansible/playbooks/prepare-low-id-cutover.yml
          --extra-vars
          "low_id_cutover_confirmed=${LOW_ID_CUTOVER_CONFIRMED}"
          --extra-vars @"${ANSIBLE_EXTRA_VARS_PATH}"

      - name: OpenTofu plan
        env:
          PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          PROXMOX_INSECURE_TLS: "true"
          PVE_NODE_NAME: ${{ vars.PVE_NODE_NAME }}
          PVE_BRIDGE: ${{ vars.PVE_BRIDGE }}
          PVE_ROOT_DATASTORE_ID: ${{ vars.PVE_ROOT_DATASTORE_ID }}
          DEPLOY_SSH_PUBLIC_KEYS: ${{ secrets.DEPLOY_SSH_PUBLIC_KEYS }}
          TOFU_STATE_BUCKET: ${{ vars.TOFU_STATE_BUCKET }}
          TOFU_STATE_KEY: ${{ vars.TOFU_STATE_KEY }}
          TOFU_STATE_REGION: ${{ vars.TOFU_STATE_REGION }}
          TOFU_STATE_ENDPOINT: ${{ vars.TOFU_STATE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TOFU_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOFU_STATE_SECRET_ACCESS_KEY }}
        run: ./scripts/ci/tofu-plan.sh

      - name: OpenTofu apply
        if: github.ref == 'refs/heads/main'
        env:
          PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          PROXMOX_INSECURE_TLS: "true"
          PVE_NODE_NAME: ${{ vars.PVE_NODE_NAME }}
          PVE_BRIDGE: ${{ vars.PVE_BRIDGE }}
          PVE_ROOT_DATASTORE_ID: ${{ vars.PVE_ROOT_DATASTORE_ID }}
          DEPLOY_SSH_PUBLIC_KEYS: ${{ secrets.DEPLOY_SSH_PUBLIC_KEYS }}
          TOFU_STATE_BUCKET: ${{ vars.TOFU_STATE_BUCKET }}
          TOFU_STATE_KEY: ${{ vars.TOFU_STATE_KEY }}
          TOFU_STATE_REGION: ${{ vars.TOFU_STATE_REGION }}
          TOFU_STATE_ENDPOINT: ${{ vars.TOFU_STATE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TOFU_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TOFU_STATE_SECRET_ACCESS_KEY }}
        run: ./scripts/ci/tofu-apply.sh

      - name: Bootstrap Proxmox and LXC access
        run: ansible-playbook -i infra/ansible/inventory/prod/hosts.yml infra/ansible/playbooks/bootstrap.yml

      - name: Deploy services
        env:
          ANSIBLE_EXTRA_VARS_PATH: ${{ runner.temp }}/ansible-extra-vars.json
        run: sh ./scripts/ci/run-ansible-parallel.sh site --extra-vars @"${ANSIBLE_EXTRA_VARS_PATH}"

      - name: Validate services
        run: sh ./scripts/ci/run-ansible-parallel.sh validate

      - name: Arm failback and move the subnet route to VMID 111
        run: >-
          ansible-playbook -i infra/ansible/inventory/prod/hosts.yml
          infra/ansible/playbooks/arm-low-id-retirement.yml

      - name: Prove Proxmox remains reachable after VMID 112 stops
        run: |
          set -eu
          for attempt in $(seq 1 48); do
            if ansible pve_hosts -i infra/ansible/inventory/prod/hosts.yml \
              -m ansible.builtin.shell \
              -a "if pct config 112 >/dev/null 2>&1; then pct status 112 | grep -q 'status: stopped'; fi"; then
              exit 0
            fi
            sleep 5
          done
          echo "The new tailnet route was not proven; VMID 112 will restart automatically." >&2
          exit 1

      - name: Retire the archived source pair
        run: >-
          ansible-playbook -i infra/ansible/inventory/prod/hosts.yml
          infra/ansible/playbooks/finalize-low-id-retirement.yml

      - name: Remove Ansible extra vars
        if: always()
        env:
          ANSIBLE_EXTRA_VARS_PATH: ${{ runner.temp }}/ansible-extra-vars.json
        run: rm -f "${ANSIBLE_EXTRA_VARS_PATH}" infra/opentofu/envs/prod/ci.auto.tfvars.json

      - name: Disconnect Tailscale
        if: always()
        run: sudo tailscale logout || true
