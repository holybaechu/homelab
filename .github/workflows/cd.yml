name: cd

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: prod
    env:
      TF_IN_AUTOMATION: "1"
      ANSIBLE_CONFIG: infra/ansible/ansible.cfg
      PROXMOX_ENDPOINT: ${{ secrets.PROXMOX_ENDPOINT }}
      PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
      PROXMOX_INSECURE_TLS: "true"
      PVE_NODE_NAME: ${{ vars.PVE_NODE_NAME }}
      PVE_BRIDGE: ${{ vars.PVE_BRIDGE }}
      PVE_ROOT_DATASTORE_ID: ${{ vars.PVE_ROOT_DATASTORE_ID }}
      DEPLOY_SSH_PUBLIC_KEYS: ${{ secrets.DEPLOY_SSH_PUBLIC_KEYS }}
      TOFU_STATE_BUCKET: ${{ vars.TOFU_STATE_BUCKET }}
      TOFU_STATE_KEY: ${{ vars.TOFU_STATE_KEY }}
      TOFU_STATE_REGION: ${{ vars.TOFU_STATE_REGION }}
      TOFU_STATE_ENDPOINT: ${{ vars.TOFU_STATE_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TOFU_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TOFU_STATE_SECRET_ACCESS_KEY }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      PVE_TAILSCALE_IP: ${{ vars.PVE_TAILSCALE_IP }}
      CLOUDFLARE_CADDY_TOKEN: ${{ secrets.CLOUDFLARE_CADDY_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_DDNS_TOKEN: ${{ secrets.CLOUDFLARE_DDNS_TOKEN }}
      CLOUDFLARE_ADGUARD_ACME_TOKEN: ${{ secrets.CLOUDFLARE_ADGUARD_ACME_TOKEN }}
      ADGUARD_ADMIN_USERNAME: ${{ vars.ADGUARD_ADMIN_USERNAME }}
      ADGUARD_ADMIN_PASSWORD: ${{ secrets.ADGUARD_ADMIN_PASSWORD }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      PROTON_WIREGUARD_PRIVATE_KEY: ${{ secrets.PROTON_WIREGUARD_PRIVATE_KEY }}
      QBITTORRENT_WEBUI_PASSWORD: ${{ secrets.QBITTORRENT_WEBUI_PASSWORD }}
      HERMES_DISCORD_BOT_TOKEN: ${{ secrets.HERMES_DISCORD_BOT_TOKEN }}
      HERMES_DISCORD_ALLOWED_USERS: ${{ secrets.HERMES_DISCORD_ALLOWED_USERS }}
      COPYPARTY_USERS_JSON: ${{ secrets.COPYPARTY_USERS_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          args: --accept-dns=false
          ping: ${{ vars.PVE_TAILSCALE_IP }}

      - name: Install tooling
        run: ./scripts/ci/install-tools.sh

      - name: Configure SSH
        run: ./scripts/ci/configure-ssh.sh

      - name: OpenTofu plan
        run: ./scripts/ci/tofu-plan.sh

      - name: OpenTofu apply
        if: github.ref == 'refs/heads/main'
        run: ./scripts/ci/tofu-apply.sh

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infra/ansible/requirements.yml

      - name: Bootstrap Proxmox and LXC access
        run: ansible-playbook -i infra/ansible/inventory/prod/hosts.yml infra/ansible/playbooks/bootstrap.yml

      - name: Write Ansible extra vars
        run: |
          python3 - <<'PY'
          import json
          import os

          mapping = {
              "cloudflare_caddy_token": os.environ["CLOUDFLARE_CADDY_TOKEN"],
              "cloudflare_zone_id": os.environ["CLOUDFLARE_ZONE_ID"],
              "cloudflare_ddns_token": os.environ["CLOUDFLARE_DDNS_TOKEN"],
              "cloudflare_adguard_acme_token": os.environ["CLOUDFLARE_ADGUARD_ACME_TOKEN"],
              "adguard_admin_password": os.environ["ADGUARD_ADMIN_PASSWORD"],
              "tailscale_auth_key": os.environ["TAILSCALE_AUTH_KEY"],
              "proton_wireguard_private_key": os.environ["PROTON_WIREGUARD_PRIVATE_KEY"],
              "qbittorrent_webui_password": os.environ["QBITTORRENT_WEBUI_PASSWORD"],
              "hermes_discord_bot_token": os.environ["HERMES_DISCORD_BOT_TOKEN"],
              "hermes_discord_allowed_users": os.environ["HERMES_DISCORD_ALLOWED_USERS"],
              "copyparty_users": json.loads(os.environ["COPYPARTY_USERS_JSON"]),
          }

          adguard_admin_username = os.environ.get("ADGUARD_ADMIN_USERNAME")
          if adguard_admin_username:
              mapping["adguard_admin_username"] = adguard_admin_username

          if not isinstance(mapping["copyparty_users"], list) or not mapping["copyparty_users"]:
              raise SystemExit("COPYPARTY_USERS_JSON must be a non-empty JSON list")

          with open("/tmp/ansible-extra-vars.json", "w", encoding="utf-8") as handle:
              json.dump(mapping, handle)
          PY

      - name: Deploy services
        run: sh ./scripts/ci/run-ansible-parallel.sh site --extra-vars @/tmp/ansible-extra-vars.json

      - name: Validate services
        run: sh ./scripts/ci/run-ansible-parallel.sh validate

      - name: Remove Ansible extra vars
        if: always()
        run: rm -f /tmp/ansible-extra-vars.json infra/opentofu/envs/prod/ci.auto.tfvars.json

      - name: Disconnect Tailscale
        if: always()
        run: sudo tailscale logout || true
