name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      ANSIBLE_CONFIG: infra/ansible/ansible.cfg
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infra/ansible/requirements.yml

      - name: Run repository tests
        run: pytest

      - name: Install OpenTofu
        run: |
          # renovate: datasource=github-releases depName=opentofu/opentofu versioning=semver extractVersion=^v(?<version>.*)$
          TOFU_VERSION=1.10.10
          curl -fsSLo /tmp/tofu.zip "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.zip"
          sudo unzip -o /tmp/tofu.zip tofu -d /usr/local/bin
          tofu version

      - name: Validate OpenTofu
        run: |
          cd infra/opentofu/envs/prod
          cp terraform.tfvars.example terraform.tfvars
          tofu init -backend=false
          tofu fmt -recursive -check ../..
          tofu validate

      - name: Check Ansible bootstrap syntax
        run: ansible-playbook -i infra/ansible/inventory/prod/hosts.yml infra/ansible/playbooks/bootstrap.yml --syntax-check

      - name: Check Ansible service syntax
        run: ansible-playbook -i infra/ansible/inventory/prod/hosts.yml infra/ansible/playbooks/site.yml --syntax-check

      - name: Check Ansible validation syntax
        run: ansible-playbook -i infra/ansible/inventory/prod/hosts.yml infra/ansible/playbooks/validate.yml --syntax-check
