[global]
  e2dsa  # enable file indexing and filesystem scanning
  e2ts   # enable multimedia indexing
  ansi   # enable colors in log messages (both in logfiles and stdout)

  rproxy: -1
  xff-src: lan

  name: copyparty.hchu.me  # Set server name
  spinner: 🎹

  localtime  # Use local timezone instead of UTC
  gsel  # Use CTRL and SHIFT to select files in grid-view
  lang: kor  # Set language to Korean

