services:
  minecraft:
    image: itzg/minecraft-server:latest
    pull_policy: daily
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      TYPE: PAPER
      EULA: TRUE
      LEVEL_TYPE: FLAT
      ENABLE_WHITELIST: TRUE
      WHITELIST_FILE: whitelist.json
    volumes:
      - /home/docker/data/minecraft:/data
