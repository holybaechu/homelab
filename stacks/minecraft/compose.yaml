services:
  proxy:
    image: itzg/mc-proxy:latest

    tty: true
    stdin_open: true
    
    restart: unless-stopped
    
    ports:
      - "25565:25577"
    
    environment:
      TYPE: VELOCITY
 
      MINECRAFT_VERSION: 1.21.10
      MODRINTH_PROJECTS: |
        viaversion
    
    volumes:
      - ./velocity.toml:/server/velocity.toml
      - proxy_data:/server
  
  flat:
    image: itzg/minecraft-server:latest
    
    tty: true
    stdin_open: true
    
    restart: unless-stopped
    
    environment:
      EULA: TRUE
      ONLINE_MODE: FALSE
      
      TYPE: PAPER
      VERSION: 1.21.10

      LEVEL_TYPE: FLAT
      GENERATOR_SETTINGS: >-
        {
            "layers": [
                {
                    "block": "minecraft:bedrock",
                    "height": 1
                },
                {
                    "block": "minecraft:dirt",
                    "height": 32
                },
                {
                    "block": "minecraft:grass_block",
                    "height": 1
                }
            ]
        }
      
      ENABLE_WHITELIST: TRUE
      MODRINTH_PROJECTS: |
        worldedit
        axiom-paper-plugin

    volumes:
      - flat_data:/data

volumes:
  proxy_data:
  flat_data: