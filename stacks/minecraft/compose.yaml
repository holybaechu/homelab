services:
  proxy:
    image: itzg/mc-proxy:latest

    tty: true
    stdin_open: true
    
    restart: unless-stopped
    
    ports:
      - "25565:25577"
    
    environment:
      TYPE: VELOCITY
 
      MINECRAFT_VERSION: 1.21.10
      MODRINTH_PROJECTS: |
        viaversion
        luckperms
    
    volumes:
      - ./velocity.toml:/server/velocity.toml
      - proxy_data:/server
    
    secrets:
      - forwarding_secret
  
  flat:
    image: itzg/minecraft-server:latest
    
    tty: true
    stdin_open: true
    
    restart: unless-stopped
    
    environment:
      EULA: TRUE
      
      TYPE: PAPER
      VERSION: 1.21.10

      LEVEL_TYPE: FLAT
      GENERATOR_SETTINGS: >-
        {
            "layers": [
                {
                    "block": "minecraft:bedrock",
                    "height": 1
                },
                {
                    "block": "minecraft:dirt",
                    "height": 32
                },
                {
                    "block": "minecraft:grass_block",
                    "height": 1
                }
            ]
        }
      
      ENABLE_WHITELIST: TRUE
      ONLINE_MODE: false

      MODRINTH_PROJECTS: |
        worldedit
        axiom-paper-plugin
        luckperms

      PATCH_DEFINITIONS: "/patches"
      REPLACE_ENV_VARIABLE_PREFIX: "CFG_"
      CFG_FORWARDING_SECRET: ${CFG_FORWARDING_SECRET}

    volumes:
      - ./patches/patch-paper-velocity-support.json:/patches/patch-paper-velocity-support.json
      - flat_data:/data

volumes:
  proxy_data:
  flat_data:

secrets:
  forwarding_secret:
    environment: "CFG_FORWARDING_SECRET"