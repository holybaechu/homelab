services:
  minecraft:
    image: itzg/minecraft-server:latest
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      WORLD_TYPE: "FLAT"
      ENABLE_WHITELIST: "TRUE"
      WHITELIST_FILE: "whitelist.txt"
    volumes:
      - /home/docker/data/minecraft:/data