docker_apps_compose_root: /opt/homelab-compose
docker_apps_data_root: /srv/docker-apps
docker_apps_public_path: /public
docker_apps_downloads_path: /downloads
docker_apps_shared_readonly_path: /shared-readonly
docker_apps_minecraft_path: /minecraft

docker_apps_timezone: "{{ homelab_timezone }}"
docker_apps_uid: "{{ docker_apps_service_uid }}"
docker_apps_gid: "{{ docker_apps_service_gid }}"

traefik_acme_email: holybaechu@proton.me
traefik_domain: hchu.me
traefik_private_domain: home.hchu.me
traefik_proxy_network: homelab_proxy
copyparty_listen_port: 3923

# Compose projects are copied from the tracked repo and receive host-rendered
# .env files from templates under roles/docker_compose_project/templates/.
docker_compose_projects:
  - name: traefik
    src: apps/compose/traefik
    dest: "{{ docker_apps_compose_root }}/traefik"
    env_template: traefik.env.j2
  - name: media
    src: apps/compose/media
    dest: "{{ docker_apps_compose_root }}/media"
    env_template: media.env.j2
    copyparty_config_template: copyparty.conf.j2
  - name: game
    src: apps/compose/game
    dest: "{{ docker_apps_compose_root }}/game"
    env_template: game.env.j2
