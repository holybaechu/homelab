---
- name: Validate Proxmox LXC root-only settings
  hosts: pve_hosts
  gather_facts: false
  tasks:
    - name: Validate root-only LXC settings match inventory
      ansible.builtin.shell: |
        set -eu
        config="$(pct config "{{ item.vmid }}")"
        {% for setting in item.settings %}
        printf '%s\n' "$config" | grep -Eq '{{ setting.pattern }}' || {
          printf 'Missing {{ setting.description }} on {{ item.name }} ({{ item.vmid }})\n' >&2
          exit 1
        }
        {% endfor %}
      args:
        executable: /bin/sh
      changed_when: false
      loop: "{{ pve_lxc_root_options }}"
      loop_control:
        label: "{{ item.name }} ({{ item.vmid }})"

- name: Validate tailnet
  hosts: svc_tailnet
  gather_facts: false
  tasks:
    - name: Check tailscaled service
      ansible.builtin.command: systemctl is-active tailscaled
      changed_when: false

    - name: Check Tailscale status
      ansible.builtin.command: tailscale status
      changed_when: false
      when: tailscale_auth_key is defined

- name: Validate Docker Compose application host
  hosts: svc_docker_apps
  gather_facts: false
  tasks:
    - name: Check Docker Engine
      ansible.builtin.command: systemctl is-active docker
      changed_when: false

    - name: Validate rendered Compose projects
      ansible.builtin.command:
        cmd: docker compose config --quiet
        chdir: "{{ item.dest }}"
      changed_when: false
      loop: "{{ docker_compose_projects }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Require every Compose service to be running
      ansible.builtin.shell: |
        set -eu
        expected="$(docker compose config --services | sort)"
        running="$(docker compose ps --services --status running | sort)"
        test "$expected" = "$running" || {
          printf 'Expected running services:\n%s\nActual running services:\n%s\n' "$expected" "$running" >&2
          docker compose ps >&2
          exit 1
        }
      args:
        executable: /bin/sh
        chdir: "{{ item.dest }}"
      changed_when: false
      retries: 12
      delay: 10
      register: compose_running
      until: compose_running.rc == 0
      loop: "{{ docker_compose_projects }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Query AdGuard normal DNS
      ansible.builtin.command: dig +short @127.0.0.1 example.com A
      register: adguard_dns_query
      changed_when: false
      failed_when: adguard_dns_query.stdout | length == 0

    - name: Query AdGuard private rewrite
      ansible.builtin.command: dig +short @127.0.0.1 qbt.home.hchu.me A
      register: adguard_private_query
      changed_when: false
      failed_when: docker_apps_ip not in adguard_private_query.stdout_lines

    - name: Check private Traefik routes
      ansible.builtin.command:
        argv:
          - curl
          - --fail
          - --silent
          - --show-error
          - --resolve
          - "{{ item }}:443:127.0.0.1"
          - "https://{{ item }}/"
      changed_when: false
      register: private_traefik_route
      retries: 12
      delay: 10
      until: private_traefik_route.rc == 0
      loop:
        - adguard.home.hchu.me
        - qbt.home.hchu.me

    - name: Check public Copyparty route
      ansible.builtin.command:
        argv:
          - curl
          - --fail
          - --silent
          - --show-error
          - --resolve
          - copyparty.hchu.me:443:127.0.0.1
          - https://copyparty.hchu.me/
      changed_when: false
      register: public_copyparty_route
      retries: 12
      delay: 10
      until: public_copyparty_route.rc == 0

    - name: Check Gluetun and host use different public addresses
      ansible.builtin.shell: |
        set -eu
        host_ip="$(curl -fsS https://api.ipify.org)"
        vpn_ip="$(docker compose exec -T gluetun wget -qO- https://api.ipify.org)"
        test -n "$host_ip"
        test -n "$vpn_ip"
        test "$host_ip" != "$vpn_ip"
      args:
        executable: /bin/sh
        chdir: "{{ docker_apps_compose_root }}/media"
      changed_when: false

    - name: Check Gluetun received a Proton forwarded port
      ansible.builtin.command:
        cmd: docker compose exec -T gluetun cat /tmp/gluetun/forwarded_port
        chdir: "{{ docker_apps_compose_root }}/media"
      register: gluetun_forwarded_port
      changed_when: false
      retries: 12
      delay: 10
      until: gluetun_forwarded_port.stdout | trim | int > 0

    - name: Check Minecraft Java listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 25565
        timeout: 60

    - name: Check Minecraft Bedrock listener
      ansible.builtin.shell: |
        set -eu
        ss -H -lun 'sport = :19132' | grep -F ':19132'
      args:
        executable: /bin/sh
      register: minecraft_bedrock_listener
      changed_when: false
      retries: 12
      delay: 10
      until: minecraft_bedrock_listener.rc == 0

    - name: Check Velocity can reach the Paper backend
      ansible.builtin.command:
        cmd: docker compose exec -T velocity bash -lc 'timeout 5 bash -c "</dev/tcp/paper/25565"'
        chdir: "{{ docker_apps_compose_root }}/game"
      changed_when: false

    - name: Check Hermes gateway status
      ansible.builtin.command:
        cmd: docker compose exec -T hermes hermes status
        chdir: "{{ docker_apps_compose_root }}/hermes"
      changed_when: false

    - name: Check Restic repository access
      ansible.builtin.command:
        cmd: docker compose exec -T restic-backup restic cat config
        chdir: "{{ docker_apps_compose_root }}/backup"
      changed_when: false
      no_log: true
