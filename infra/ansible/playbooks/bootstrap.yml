---
- name: Configure Proxmox homelab data storage
  hosts: pve_hosts
  gather_facts: false
  roles:
    - pve_homelab_storage

- name: Configure Proxmox root-only LXC options
  hosts: pve_hosts
  gather_facts: false
  roles:
    - pve_lxc_root_options

- name: Bootstrap LXC SSH and Python access from Proxmox
  hosts: pve_hosts
  gather_facts: false
  roles:
    - pve_lxc_access_bootstrap

- name: Trust LXC SSH host keys
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Add LXC SSH host keys to known_hosts
      ansible.builtin.shell: |
        set -eu
        host="{{ item }}"
        mkdir -p "${HOME}/.ssh"
        touch "${HOME}/.ssh/known_hosts"
        chmod 700 "${HOME}/.ssh"
        chmod 600 "${HOME}/.ssh/known_hosts"
        ssh-keygen -R "${host}" >/dev/null 2>&1 || true

        for attempt in 1 2 3 4 5 6; do
          if ssh-keyscan -H -T 10 "${host}" >> "${HOME}/.ssh/known_hosts"; then
            exit 0
          fi

          echo "ssh-keyscan failed for ${host} (attempt ${attempt}/6); retrying" >&2
          sleep 5
        done

        echo "ssh-keyscan failed for ${host} after 6 attempts" >&2
        exit 1
      args:
        executable: /bin/sh
      changed_when: true
      loop: >-
        {{ (groups['alpine'] | default([]) + groups['debian'] | default([]))
        | map('extract', hostvars, 'ansible_host') | list }}

- name: Bootstrap Alpine LXCs
  hosts: alpine
  gather_facts: false
  roles:
    - common_alpine

- name: Bootstrap Debian LXCs
  hosts: debian
  gather_facts: false
  roles:
    - common_debian
