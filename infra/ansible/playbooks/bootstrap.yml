---
- name: Configure Proxmox homelab data storage
  hosts: pve_hosts
  gather_facts: false
  roles:
    - pve_homelab_storage

- name: Configure Proxmox root-only LXC options
  hosts: pve_hosts
  gather_facts: false
  roles:
    - pve_lxc_root_options

- name: Bootstrap LXC SSH and Python access from Proxmox
  hosts: pve_hosts
  gather_facts: false
  roles:
    - pve_lxc_access_bootstrap

- name: Trust LXC SSH host keys
  hosts: pve_hosts
  gather_facts: false
  tasks:
    - name: Read LXC ed25519 host public keys through pct exec
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ item.vmid }}"
          - --
          - /bin/sh
          - -lc
          - cat /etc/ssh/ssh_host_ed25519_key.pub
      changed_when: false
      register: pve_lxc_host_key_results
      loop: "{{ pve_lxc_access_bootstrap }}"
      loop_control:
        label: "{{ item.name }} ({{ item.vmid }})"

    - name: Ensure local SSH directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ssh"
        state: directory
        mode: "0700"
      delegate_to: localhost
      run_once: true

    - name: Add LXC SSH host keys to known_hosts
      ansible.builtin.known_hosts:
        path: "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
        name: "{{ hostvars[item.item.name].ansible_host }}"
        key: "{{ hostvars[item.item.name].ansible_host }} {{ item.stdout }}"
      delegate_to: localhost
      loop: "{{ pve_lxc_host_key_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

- name: Bootstrap Alpine LXCs
  hosts: alpine
  gather_facts: false
  roles:
    - common_alpine

- name: Bootstrap Debian LXCs
  hosts: debian
  gather_facts: false
  roles:
    - common_debian
