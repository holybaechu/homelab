---
- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - apache2-utils
      - ca-certificates
      - curl
      - dnsutils
      - gnupg
      - systemd-resolved
    update_cache: true
    state: present

- name: Disable systemd-resolved DNS stub for AdGuard port 53
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure systemd-resolved without a local DNS stub
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/adguardhome.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Resolve]
      DNS=1.1.1.1 1.0.0.1
      FallbackDNS=8.8.8.8
      DNSStubListener=no
  notify: Restart systemd-resolved

- name: Use systemd-resolved upstream resolvers without the local stub
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  notify: Restart systemd-resolved

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ docker_engine_debian_codename | default(ansible_distribution_release) }} stable"
    filename: docker
    state: present
    update_cache: true

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Configure Docker daemon defaults
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Docker

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Apply Docker and resolver changes before Compose starts
  ansible.builtin.meta: flush_handlers
