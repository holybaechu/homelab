---
- name: Install AdGuard dependencies
  community.general.apk:
    name:
      - ca-certificates
      - curl
      - drill
      - apache2-utils
      - ldns
      - libcap
      - nftables
      - tar
    update_cache: true
    state: present

- name: Create AdGuard install directory
  ansible.builtin.file:
    path: "{{ adguard_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create AdGuard service directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0750"
  loop:
    - "{{ adguard_work_dir }}"
    - "{{ adguard_conf_dir }}"

- name: Create AdGuard TLS directory
  ansible.builtin.file:
    path: "{{ adguard_tls_dir }}"
    state: directory
    owner: root
    group: "{{ service_group }}"
    mode: "0750"

- name: Create AdGuard versioned extract directory
  ansible.builtin.file:
    path: "/tmp/AdGuardHome-{{ adguard_version }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download AdGuard Home
  ansible.builtin.get_url:
    url: "https://github.com/AdguardTeam/AdGuardHome/releases/download/{{ adguard_version }}/AdGuardHome_{{ adguard_arch }}.tar.gz"
    dest: "/tmp/AdGuardHome_{{ adguard_version }}_{{ adguard_arch }}.tar.gz"
    mode: "0644"

- name: Extract AdGuard Home
  ansible.builtin.unarchive:
    src: "/tmp/AdGuardHome_{{ adguard_version }}_{{ adguard_arch }}.tar.gz"
    dest: "/tmp/AdGuardHome-{{ adguard_version }}"
    remote_src: true
    creates: "/tmp/AdGuardHome-{{ adguard_version }}/AdGuardHome/AdGuardHome"

- name: Install AdGuard binary
  ansible.builtin.copy:
    src: "/tmp/AdGuardHome-{{ adguard_version }}/AdGuardHome/AdGuardHome"
    dest: "{{ adguard_install_dir }}/AdGuardHome"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: Restart adguardhome

- name: Allow AdGuard to bind privileged ports
  ansible.builtin.command:
    cmd: "setcap cap_net_bind_service=+ep {{ adguard_install_dir }}/AdGuardHome"
  changed_when: false

- name: Install AdGuard nftables config
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.nft
    owner: root
    group: root
    mode: "0600"
    validate: nft -c -f %s
  notify: Restart adguard nftables

- name: Enable AdGuard nftables
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

- name: Require AdGuard admin credentials
  ansible.builtin.assert:
    that:
      - adguard_admin_username is defined
      - adguard_admin_username | length > 0
      - adguard_admin_username is match('^[A-Za-z0-9_.-]+$')
      - adguard_admin_password is defined
      - adguard_admin_password | length > 0
    fail_msg: adguard_admin_username and adguard_admin_password must be provided; the role hashes the password before writing AdGuard config.
  no_log: true

- name: Read existing AdGuard admin password hash
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        from pathlib import Path
        import sys

        path = Path(sys.argv[1])
        username = sys.argv[2]
        if not path.exists():
            print("")
            raise SystemExit(0)

        lines = path.read_text(encoding="utf-8").splitlines()
        for index, line in enumerate(lines):
            if line.strip() == f'- name: "{username}"':
                for candidate in lines[index + 1 : index + 4]:
                    stripped = candidate.strip()
                    if stripped.startswith("password:"):
                        print(stripped.split(":", 1)[1].strip().strip('"'))
                        raise SystemExit(0)
        print("")
      - "{{ adguard_conf_dir }}/AdGuardHome.yaml"
      - "{{ adguard_admin_username }}"
  register: adguard_existing_admin_hash
  changed_when: false
  no_log: true

- name: Verify existing AdGuard admin password hash
  ansible.builtin.shell: |
    set -eu
    tmp="$(mktemp)"
    trap 'rm -f "${tmp}"' EXIT
    printf '%s:%s\n' "${ADGUARD_ADMIN_USERNAME}" "${ADGUARD_ADMIN_HASH}" > "${tmp}"
    htpasswd -vb "${tmp}" "${ADGUARD_ADMIN_USERNAME}" "${ADGUARD_ADMIN_PASSWORD}" >/dev/null
  args:
    executable: /bin/sh
  environment:
    ADGUARD_ADMIN_USERNAME: "{{ adguard_admin_username }}"
    ADGUARD_ADMIN_HASH: "{{ adguard_existing_admin_hash.stdout }}"
    ADGUARD_ADMIN_PASSWORD: "{{ adguard_admin_password }}"
  register: adguard_existing_admin_hash_verify
  changed_when: false
  failed_when: false
  no_log: true
  when: adguard_existing_admin_hash.stdout | length > 0

- name: Hash AdGuard admin password when rotation is required
  ansible.builtin.command:
    argv:
      - htpasswd
      - -B
      - -C
      - "10"
      - -n
      - -b
      - "{{ adguard_admin_username }}"
      - "{{ adguard_admin_password }}"
  register: adguard_admin_htpasswd
  changed_when: false
  no_log: true
  when: adguard_existing_admin_hash_verify.rc | default(1) != 0

- name: Set AdGuard admin password hash
  ansible.builtin.set_fact:
    adguard_admin_password_hash: >-
      {{ adguard_existing_admin_hash.stdout
      if (adguard_existing_admin_hash_verify.rc | default(1)) == 0
      else adguard_admin_htpasswd.stdout.split(':', 1)[1] }}
  no_log: true

- name: Install baseline AdGuard config when no migrated config exists
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_conf_dir }}/AdGuardHome.yaml"
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0640"
    force: false
  no_log: true
  notify: Restart adguardhome

- name: Update AdGuard admin user in existing config
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        from pathlib import Path
        import sys

        path = Path(sys.argv[1])
        username = sys.argv[2]
        password_hash = sys.argv[3]

        lines = path.read_text(encoding="utf-8").splitlines()
        try:
            start = lines.index("users:")
        except ValueError:
            raise SystemExit("users block not found")

        end = len(lines)
        for index in range(start + 1, len(lines)):
            line = lines[index]
            if line and not line.startswith((" ", "\t", "-")):
                end = index
                break

        replacement = [
            "users:",
            f'  - name: "{username}"',
            f'    password: "{password_hash}"',
        ]
        if lines[start:end] == replacement:
            print("unchanged")
        else:
            lines = lines[:start] + replacement + lines[end:]
            path.write_text("\n".join(lines) + "\n", encoding="utf-8")
            print("changed")
      - "{{ adguard_conf_dir }}/AdGuardHome.yaml"
      - "{{ adguard_admin_username }}"
      - "{{ adguard_admin_password_hash }}"
  register: adguard_admin_user_config
  changed_when: adguard_admin_user_config.stdout == "changed"
  no_log: true
  notify: Restart adguardhome

- name: Update AdGuard DNS, TLS, trusted proxies, and filters in existing config
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        from pathlib import Path
        import json
        import sys

        path = Path(sys.argv[1])
        trusted_proxies = json.loads(sys.argv[2])
        dns_filters = json.loads(sys.argv[3])
        upstream_dns = json.loads(sys.argv[4])
        bootstrap_dns = json.loads(sys.argv[5])
        fallback_dns = json.loads(sys.argv[6])
        tls_config = json.loads(sys.argv[7])

        def yaml_quote(value):
            return '"' + str(value).replace("\\", "\\\\").replace('"', '\\"') + '"'

        def yaml_scalar(value):
            if isinstance(value, bool):
                return str(value).lower()
            return str(value)

        def nested_list_lines(key, values):
            lines = [f"  {key}:"]
            lines.extend(f"    - {value}" for value in values)
            return lines

        def replace_top_level_block(lines, key, replacement):
            marker = f"{key}:"
            try:
                start = lines.index(marker)
            except ValueError:
                lines.extend(replacement)
                return lines, True

            end = len(lines)
            for index in range(start + 1, len(lines)):
                line = lines[index]
                if line and not line.startswith((" ", "\t", "-")):
                    end = index
                    break

            if lines[start:end] == replacement:
                return lines, False
            return lines[:start] + replacement + lines[end:], True

        def replace_nested_block(lines, parent, child, replacement):
            parent_marker = f"{parent}:"
            try:
                parent_start = lines.index(parent_marker)
            except ValueError:
                raise SystemExit(f"{parent_marker} block not found")

            parent_end = len(lines)
            for index in range(parent_start + 1, len(lines)):
                line = lines[index]
                if line and not line.startswith((" ", "\t", "-")):
                    parent_end = index
                    break

            child_marker = f"  {child}:"
            child_blocks = []
            index = parent_start + 1
            while index < parent_end:
                line = lines[index]
                if line == child_marker or line.startswith(f"{child_marker} "):
                    child_start = index
                    child_end = parent_end
                    for end_index in range(child_start + 1, parent_end):
                        next_line = lines[end_index]
                        if next_line.startswith("  ") and not next_line.startswith("    "):
                            child_end = end_index
                            break
                    child_blocks.append((child_start, child_end))
                    index = child_end
                else:
                    index += 1

            if not child_blocks:
                insert_at = parent_end
                return lines[:insert_at] + replacement + lines[insert_at:], True

            changed = False
            updated = []
            cursor = 0
            for block_index, (child_start, child_end) in enumerate(child_blocks):
                updated.extend(lines[cursor:child_start])
                if block_index == 0:
                    updated.extend(replacement)
                    changed = changed or lines[child_start:child_end] != replacement
                else:
                    changed = True
                cursor = child_end
            updated.extend(lines[cursor:])
            return updated, changed

        trusted_proxy_lines = ["  trusted_proxies:"]
        trusted_proxy_lines.extend(f"    - {proxy}" for proxy in trusted_proxies)

        upstream_dns_lines = nested_list_lines("upstream_dns", upstream_dns)
        bootstrap_dns_lines = nested_list_lines("bootstrap_dns", bootstrap_dns)
        fallback_dns_lines = nested_list_lines("fallback_dns", fallback_dns)

        tls_lines = ["tls:"]
        for key in (
            "enabled",
            "server_name",
            "force_https",
            "port_https",
            "port_dns_over_tls",
            "port_dns_over_quic",
            "certificate_path",
            "private_key_path",
        ):
            tls_lines.append(f"  {key}: {yaml_scalar(tls_config[key])}")

        filter_lines = ["filters:"]
        for dns_filter in dns_filters:
            enabled = str(dns_filter.get("enabled", True)).lower()
            filter_lines.extend(
                [
                    f"  - enabled: {enabled}",
                    f"    url: {dns_filter['url']}",
                    f"    name: {yaml_quote(dns_filter['name'])}",
                    f"    id: {dns_filter['id']}",
                ]
            )

        lines = path.read_text(encoding="utf-8").splitlines()
        changed = False
        lines, block_changed = replace_nested_block(
            lines, "dns", "trusted_proxies", trusted_proxy_lines
        )
        changed = changed or block_changed
        lines, block_changed = replace_nested_block(lines, "dns", "upstream_dns", upstream_dns_lines)
        changed = changed or block_changed
        lines, block_changed = replace_nested_block(lines, "dns", "bootstrap_dns", bootstrap_dns_lines)
        changed = changed or block_changed
        lines, block_changed = replace_nested_block(lines, "dns", "fallback_dns", fallback_dns_lines)
        changed = changed or block_changed
        lines, block_changed = replace_top_level_block(lines, "tls", tls_lines)
        changed = changed or block_changed
        lines, block_changed = replace_top_level_block(lines, "filters", filter_lines)
        changed = changed or block_changed

        if changed:
            path.write_text("\n".join(lines) + "\n", encoding="utf-8")
            print("changed")
        else:
            print("unchanged")
      - "{{ adguard_conf_dir }}/AdGuardHome.yaml"
      - "{{ adguard_trusted_proxies | to_json }}"
      - "{{ adguard_dns_filters | to_json }}"
      - "{{ adguard_upstream_dns | to_json }}"
      - "{{ adguard_bootstrap_dns | to_json }}"
      - "{{ adguard_fallback_dns | to_json }}"
      - "{{ adguard_tls_config | to_json }}"
  register: adguard_proxy_filter_config
  changed_when: adguard_proxy_filter_config.stdout == "changed"
  notify: Restart adguardhome
  vars:
    adguard_tls_config:
      enabled: true
      server_name: "{{ adguard_cert_domain }}"
      force_https: false
      port_https: "{{ adguard_https_port }}"
      port_dns_over_tls: "{{ adguard_dot_port }}"
      port_dns_over_quic: "{{ adguard_dot_port }}"
      certificate_path: "{{ adguard_tls_dir }}/fullchain.pem"
      private_key_path: "{{ adguard_tls_dir }}/privkey.pem"

- name: Install AdGuard OpenRC service
  ansible.builtin.template:
    src: adguard.openrc.j2
    dest: /etc/init.d/adguardhome
    mode: "0755"
  notify: Restart adguardhome

- name: Start AdGuard when configuration exists
  ansible.builtin.service:
    name: adguardhome
    enabled: true
    state: started
  when: ansible_facts['distribution'] == 'Alpine'
