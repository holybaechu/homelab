---
- name: Install lego
  community.general.apk:
    name: lego
    update_cache: true
    state: present

- name: Create lego data directory
  ansible.builtin.file:
    path: /var/lib/lego
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create AdGuard TLS directory
  ansible.builtin.file:
    path: "{{ adguard_tls_dir }}"
    state: directory
    owner: root
    group: "{{ service_group }}"
    mode: "0750"

- name: Install AdGuard ACME script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../apps/dns/acme/renew-adguard-cert.sh"
    dest: /usr/local/bin/renew-adguard-cert
    owner: root
    group: root
    mode: "0700"
  notify: Restart adguard-acme

- name: Install AdGuard ACME loop
  ansible.builtin.copy:
    dest: /usr/local/bin/adguard-acme-loop
    owner: root
    group: root
    mode: "0700"
    content: |
      #!/bin/sh
      set -eu
      export CLOUDFLARE_ADGUARD_ACME_TOKEN="{{ cloudflare_adguard_acme_token }}"
      export ADGUARD_CERT_DOMAIN="{{ adguard_cert_domain }}"
      export ADGUARD_TLS_DIR="{{ adguard_tls_dir }}"
      export ADGUARD_TLS_GROUP="{{ service_group }}"
      export ACME_EMAIL="holybaechu@proton.me"
      while true; do
        /usr/local/bin/renew-adguard-cert
        sleep {{ adguard_acme_interval_seconds }}
      done
  no_log: true
  notify: Restart adguard-acme

- name: Stat AdGuard TLS files
  ansible.builtin.stat:
    path: "{{ adguard_tls_dir }}/{{ item }}"
  loop:
    - fullchain.pem
    - privkey.pem
  register: adguard_tls_files

- name: Issue initial AdGuard certificate when missing
  ansible.builtin.command:
    cmd: /usr/local/bin/renew-adguard-cert
  environment:
    CLOUDFLARE_ADGUARD_ACME_TOKEN: "{{ cloudflare_adguard_acme_token }}"
    ADGUARD_CERT_DOMAIN: "{{ adguard_cert_domain }}"
    ADGUARD_TLS_DIR: "{{ adguard_tls_dir }}"
    ADGUARD_TLS_GROUP: "{{ service_group }}"
    ACME_EMAIL: "holybaechu@proton.me"
  no_log: true
  when: adguard_tls_files.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

- name: Enforce AdGuard TLS file permissions
  ansible.builtin.file:
    path: "{{ adguard_tls_dir }}/{{ item.item }}"
    owner: root
    group: "{{ service_group }}"
    mode: "0640"
  loop: "{{ adguard_tls_files.results }}"
  when: item.stat.exists

- name: Install AdGuard ACME OpenRC service
  ansible.builtin.template:
    src: adguard-acme.openrc.j2
    dest: /etc/init.d/adguard-acme
    mode: "0755"
  notify: Restart adguard-acme

- name: Enable AdGuard ACME
  ansible.builtin.service:
    name: adguard-acme
    enabled: true
    state: started
