---
- name: Configure homelab data filesystem
  ansible.builtin.shell: |
    set -eu
    changed=0
    lv_path="/dev/pve/{{ homelab_data_lv_name }}"
    mount_path="{{ homelab_data_mount }}"
    tmp_mount="/mnt/{{ homelab_data_lv_name }}-init"
    permissions_marker="${mount_path}/.homelab-two-lxc-permissions-v1"
    migration_marker="${mount_path}/.homelab-two-lxc-data-migrated-v1"

    if [ ! -e "${lv_path}" ]; then
      lvcreate -V "{{ homelab_data_lv_size }}" -T pve/data -n "{{ homelab_data_lv_name }}"
      mkfs.ext4 -F "${lv_path}"
      changed=1
    fi

    if ! blkid "${lv_path}" >/dev/null 2>&1; then
      mkfs.ext4 -F "${lv_path}"
      changed=1
    fi

    mkdir -p "${mount_path}"
    if ! mountpoint -q "${mount_path}"; then
      mkdir -p "${tmp_mount}"
      if ! mountpoint -q "${tmp_mount}"; then
        mount "${lv_path}" "${tmp_mount}"
      fi
      rsync -a "${mount_path}/" "${tmp_mount}/"
      umount "${tmp_mount}"
      uuid="$(blkid -s UUID -o value "${lv_path}")"
      if ! grep -qE "[[:space:]]${mount_path}[[:space:]]" /etc/fstab; then
        printf 'UUID=%s %s ext4 defaults,noatime 0 2\n' "${uuid}" "${mount_path}" >> /etc/fstab
      fi
      mount "${mount_path}"
      changed=1
    fi

    mkdir -p \
      "${mount_path}/docker-apps/qbittorrent/qBittorrent" \
      "${mount_path}/docker-apps/copyparty" \
      "${mount_path}/downloads/complete" \
      "${mount_path}/downloads/incomplete" \
      "${mount_path}/copyparty/public" \
      "${mount_path}/copyparty/shared-readonly" \
      "${mount_path}/minecraft/paper" \
      "${mount_path}/minecraft/velocity" \
      "${mount_path}/hermes/home" \
      "${mount_path}/hermes/workspace"

    mounted_vmid=""
    cleanup_lxc_mount() {
      if [ -n "${mounted_vmid}" ]; then
        pct unmount "${mounted_vmid}" >/dev/null 2>&1 || true
      fi
    }
    trap cleanup_lxc_mount EXIT

    migrate_tree() {
      vmid="$1"
      source_path="$2"
      target_path="$3"
      if ! pct status "${vmid}" >/dev/null 2>&1; then
        return 0
      fi
      pct mount "${vmid}" >/dev/null
      mounted_vmid="${vmid}"
      rootfs="/var/lib/lxc/${vmid}/rootfs"
      if [ -d "${rootfs}${source_path}" ]; then
        mkdir -p "${target_path}"
        rsync -a --ignore-existing "${rootfs}${source_path}/" "${target_path}/"
      fi
      pct unmount "${vmid}"
      mounted_vmid=""
    }

    if [ ! -e "${migration_marker}" ]; then
      migrate_tree 113 /var/lib/qbittorrent/.config/QBittorrent \
        "${mount_path}/docker-apps/qbittorrent/qBittorrent"
      migrate_tree 113 /var/lib/qbittorrent/.config/qBittorrent \
        "${mount_path}/docker-apps/qbittorrent/qBittorrent"
      migrate_tree 113 /var/lib/qbittorrent/.local/share/qBittorrent \
        "${mount_path}/docker-apps/qbittorrent/qBittorrent"
      migrate_tree 114 /var/lib/copyparty \
        "${mount_path}/docker-apps/copyparty"
      touch "${migration_marker}"
      changed=1
    fi

    if [ ! -e "${permissions_marker}" ] || [ "{{ homelab_data_reconcile_permissions | default(false) | lower }}" = "true" ]; then
      app_uid={{ homelab_container_uid_offset + service_uid }}
      hermes_uid={{ homelab_container_uid_offset + hermes_service_uid }}
      chown -R "${app_uid}:${app_uid}" \
        "${mount_path}/docker-apps" \
        "${mount_path}/downloads" \
        "${mount_path}/copyparty" \
        "${mount_path}/minecraft"
      chown -R "${hermes_uid}:${hermes_uid}" "${mount_path}/hermes"
      find \
        "${mount_path}/docker-apps" \
        "${mount_path}/downloads" \
        "${mount_path}/copyparty" \
        "${mount_path}/minecraft" \
        "${mount_path}/hermes" \
        -type d -exec chmod 0755 {} +
      touch "${permissions_marker}"
      changed=1
    fi

    if [ "${changed}" -eq 1 ]; then
      echo changed=yes
    else
      echo changed=no
    fi
  args:
    executable: /bin/sh
  register: pve_homelab_storage_result
  changed_when: "'changed=yes' in pve_homelab_storage_result.stdout"
