---
- name: Install ACL tools for shared bind-mount permissions
  ansible.builtin.apt:
    name: acl
    state: present

- name: Configure homelab data filesystem
  ansible.builtin.shell: |
    set -eu
    changed=0
    lv_path="/dev/pve/{{ homelab_data_lv_name }}"
    mount_path="{{ homelab_data_mount }}"
    tmp_mount="/mnt/{{ homelab_data_lv_name }}-init"
    permissions_marker="${mount_path}/.homelab-permissions-initialized"
    public_qbt_acl_marker="${mount_path}/.homelab-public-qbittorrent-acl-v1"
    docker_apps_acl_marker="${mount_path}/.homelab-docker-apps-acl-v1"

    if [ ! -e "${lv_path}" ]; then
      lvcreate -V "{{ homelab_data_lv_size }}" -T pve/data -n "{{ homelab_data_lv_name }}"
      mkfs.ext4 -F "${lv_path}"
      changed=1
    fi

    if ! blkid "${lv_path}" >/dev/null 2>&1; then
      mkfs.ext4 -F "${lv_path}"
      changed=1
    fi

    mkdir -p "${mount_path}"

    if ! mountpoint -q "${mount_path}"; then
      mkdir -p "${tmp_mount}"
      if ! mountpoint -q "${tmp_mount}"; then
        mount "${lv_path}" "${tmp_mount}"
      fi

      if [ -d "${mount_path}" ]; then
        rsync -a "${mount_path}/" "${tmp_mount}/"
      fi

      umount "${tmp_mount}"
      uuid="$(blkid -s UUID -o value "${lv_path}")"
      if ! grep -qE "[[:space:]]${mount_path}[[:space:]]" /etc/fstab; then
        printf 'UUID=%s %s ext4 defaults,noatime 0 2\n' "${uuid}" "${mount_path}" >> /etc/fstab
      fi
      mount "${mount_path}"
      changed=1
    fi

    mkdir -p \
      "${mount_path}/downloads/complete" \
      "${mount_path}/downloads/incomplete" \
      "${mount_path}/copyparty/public" \
      "${mount_path}/copyparty/shared-readonly" \
      "${mount_path}/copyparty/downloads" \
      "${mount_path}/docker-apps/traefik" \
      "${mount_path}/docker-apps/adguard/work" \
      "${mount_path}/docker-apps/adguard/conf" \
      "${mount_path}/docker-apps/adguard/tls" \
      "${mount_path}/docker-apps/adguard/lego" \
      "${mount_path}/docker-apps/qbittorrent" \
      "${mount_path}/docker-apps/gluetun" \
      "${mount_path}/docker-apps/copyparty" \
      "${mount_path}/minecraft" \
      "${mount_path}/hermes/home" \
      "${mount_path}/hermes/workspace"

    if [ ! -e "${permissions_marker}" ] || [ "{{ homelab_data_reconcile_permissions | default(false) | lower }}" = "true" ]; then
      chown -R {{ homelab_container_uid_offset + downloads_service_uid }}:{{ homelab_container_uid_offset + downloads_service_gid }} "${mount_path}/downloads"
      chown -R {{ homelab_container_uid_offset + service_uid }}:{{ homelab_container_uid_offset + service_gid }} "${mount_path}/copyparty"
      chown -R {{ homelab_container_uid_offset + hermes_service_uid }}:{{ homelab_container_uid_offset + hermes_service_gid }} "${mount_path}/hermes"
      chown -R {{ homelab_container_uid_offset + docker_apps_service_uid }}:{{ homelab_container_uid_offset + docker_apps_service_gid }} "${mount_path}/docker-apps" "${mount_path}/minecraft"
      chmod 0755 "${mount_path}" "${mount_path}/downloads" "${mount_path}/downloads/complete" "${mount_path}/downloads/incomplete" "${mount_path}/copyparty"
      chmod 0755 "${mount_path}/copyparty/public" "${mount_path}/copyparty/shared-readonly" "${mount_path}/copyparty/downloads"
      chmod 0755 "${mount_path}/docker-apps" "${mount_path}/docker-apps/traefik" "${mount_path}/docker-apps/adguard" "${mount_path}/docker-apps/adguard/work" "${mount_path}/docker-apps/adguard/conf" "${mount_path}/docker-apps/adguard/tls" "${mount_path}/docker-apps/adguard/lego" "${mount_path}/docker-apps/qbittorrent" "${mount_path}/docker-apps/gluetun" "${mount_path}/docker-apps/copyparty" "${mount_path}/minecraft"
      chmod 0755 "${mount_path}/hermes" "${mount_path}/hermes/home" "${mount_path}/hermes/workspace"
      find "${mount_path}/copyparty/public" -type d -exec chmod 0755 {} +
      find "${mount_path}/copyparty/public" -type f -exec chmod 0644 {} +
      touch "${permissions_marker}"
      echo "permissions_changed=1"
      changed=1
    else
      echo "permissions_changed=0"
    fi

    if [ ! -e "${public_qbt_acl_marker}" ] || [ "{{ homelab_data_reconcile_permissions | default(false) | lower }}" = "true" ]; then
      setfacl -R -m "u:{{ homelab_container_uid_offset + service_uid }}:rwX,u:{{ homelab_container_uid_offset + downloads_service_uid }}:rwX" "${mount_path}/copyparty/public"
      find "${mount_path}/copyparty/public" -type d -exec setfacl -m "d:u:{{ homelab_container_uid_offset + service_uid }}:rwx,d:u:{{ homelab_container_uid_offset + downloads_service_uid }}:rwx" {} +
      touch "${public_qbt_acl_marker}"
      echo "public_qbittorrent_acl_changed=1"
      changed=1
    else
      echo "public_qbittorrent_acl_changed=0"
    fi


    if [ ! -e "${docker_apps_acl_marker}" ] || [ "{{ homelab_data_reconcile_permissions | default(false) | lower }}" = "true" ]; then
      setfacl -R -m "u:{{ homelab_container_uid_offset + docker_apps_service_uid }}:rwX" "${mount_path}/downloads" "${mount_path}/copyparty/public" "${mount_path}/minecraft"
      setfacl -R -m "u:{{ homelab_container_uid_offset + docker_apps_service_uid }}:rX" "${mount_path}/copyparty/shared-readonly"
      find "${mount_path}/downloads" "${mount_path}/copyparty/public" "${mount_path}/minecraft" -type d -exec setfacl -m "d:u:{{ homelab_container_uid_offset + docker_apps_service_uid }}:rwx" {} +
      find "${mount_path}/copyparty/shared-readonly" -type d -exec setfacl -m "d:u:{{ homelab_container_uid_offset + docker_apps_service_uid }}:rx" {} +
      touch "${docker_apps_acl_marker}"
      echo "docker_apps_acl_changed=1"
      changed=1
    else
      echo "docker_apps_acl_changed=0"
    fi

    if [ "${changed}" -eq 1 ]; then
      echo "changed=yes"
    else
      echo "changed=no"
    fi
  args:
    executable: /bin/sh
  register: pve_homelab_storage_result
  changed_when: "'changed=yes' in pve_homelab_storage_result.stdout"
