---
- name: Require Hermes Discord gateway, web backend, browser, and 1Password credentials
  ansible.builtin.assert:
    that:
      - hermes_discord_bot_token is defined
      - hermes_discord_bot_token | length > 0
      - hermes_discord_allowed_users is defined
      - hermes_discord_allowed_users | length > 0
      - hermes_parallel_api_key is defined
      - hermes_parallel_api_key | length > 0
      - hermes_firecrawl_api_key is defined
      - hermes_firecrawl_api_key | length > 0
      - hermes_browserbase_api_key is defined
      - hermes_browserbase_api_key | length > 0
      - hermes_browserbase_project_id is defined
      - hermes_browserbase_project_id | length > 0
      - hermes_1password_service_account_token is defined
      - hermes_1password_service_account_token | length > 0
      - hermes_newrrow_username_ref is defined
      - hermes_newrrow_username_ref | length > 0
      - hermes_newrrow_password_ref is defined
      - hermes_newrrow_password_ref | length > 0
      - hermes_config_repo_token is defined
      - hermes_config_repo_token | length > 0
      - hermes_config_webhook_secret is defined
      - hermes_config_webhook_secret | length > 0
    fail_msg: Hermes Discord, web backend, Browserbase, 1Password, Newrrow 1Password refs, and hermes-config Git/webhook secrets must be provided.
  no_log: true

- name: Install Hermes runtime packages
  ansible.builtin.apt:
    name:
      - bash
      - build-essential
      - ca-certificates
      - curl
      - gh
      - git
      - inotify-tools
      - nodejs
      - npm
      - python3
      - python3-pip
      - python3-venv
    update_cache: true
    state: present

- name: Download 1Password apt signing key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /usr/share/keyrings/1password-archive-keyring.asc
    owner: root
    group: root
    mode: "0644"

- name: Configure 1Password apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/1password.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.asc] https://downloads.1password.com/linux/debian/amd64 stable main

- name: Install 1Password CLI
  ansible.builtin.apt:
    name: 1password-cli
    update_cache: true
    state: present

- name: Create Hermes group
  ansible.builtin.group:
    name: "{{ hermes_group }}"
    gid: "{{ hermes_gid }}"
    state: present

- name: Create Hermes user
  ansible.builtin.user:
    name: "{{ hermes_user }}"
    uid: "{{ hermes_uid }}"
    group: "{{ hermes_group }}"
    shell: /bin/bash
    create_home: false
    home: "{{ hermes_home }}"
    state: present

- name: Create Hermes install directory
  ansible.builtin.file:
    path: "{{ hermes_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Stop and disable old Hermes WebUI service
  ansible.builtin.systemd:
    name: hermes-webui.service
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false

- name: Remove old Hermes WebUI artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ hermes_install_dir }}/hermes-webui"
    - /etc/hermes-webui.env
    - /etc/systemd/system/hermes-webui.service
    - "{{ hermes_home }}/webui"

- name: Require Hermes persistent bind mounts
  ansible.builtin.command:
    cmd: mountpoint -q "{{ item }}"
  changed_when: false
  loop:
    - "{{ hermes_home }}"
    - "{{ hermes_workspace }}"

- name: Create Hermes persistent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"
  loop:
    - "{{ hermes_home }}"
    - "{{ hermes_workspace }}"

- name: Clone Hermes Agent
  ansible.builtin.git:
    repo: "{{ hermes_agent_repo }}"
    dest: "{{ hermes_agent_dir }}"
    version: "{{ hermes_agent_ref }}"
    update: true
  register: hermes_agent_checkout
  notify: Restart hermes-gateway

- name: Create Hermes Python virtualenv
  ansible.builtin.command:
    cmd: python3 -m venv "{{ hermes_venv_path }}"
    creates: "{{ hermes_venv_path }}/bin/python"

- name: Upgrade Hermes virtualenv packaging tools
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    virtualenv: "{{ hermes_venv_path }}"

- name: Install Hermes Agent messaging extras into virtualenv
  ansible.builtin.pip:
    name: "{{ hermes_agent_dir }}[messaging]"
    editable: true
    virtualenv: "{{ hermes_venv_path }}"
  notify: Restart hermes-gateway

- name: Install Hermes config sync environment
  ansible.builtin.template:
    src: hermes-config-sync.env.j2
    dest: "{{ hermes_config_sync_env_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify:
    - Restart hermes-config-watch
    - Restart hermes-config-webhook
    - Restart hermes-config-sync timer

- name: Install Hermes config git askpass helper
  ansible.builtin.template:
    src: hermes-config-git-askpass.sh.j2
    dest: "{{ hermes_config_askpass_path }}"
    owner: root
    group: root
    mode: "0700"

- name: Install Hermes config apply helper
  ansible.builtin.template:
    src: hermes-config-apply.py.j2
    dest: "{{ hermes_config_apply_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install Hermes config git sync helper
  ansible.builtin.template:
    src: hermes-config-git-sync.sh.j2
    dest: "{{ hermes_config_git_sync_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Install Hermes config webhook receiver
  ansible.builtin.template:
    src: hermes-config-webhook.py.j2
    dest: "{{ hermes_config_webhook_path }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart hermes-config-webhook

- name: Install Hermes config sync service
  ansible.builtin.template:
    src: hermes-config-sync.service.j2
    dest: /etc/systemd/system/hermes-config-sync.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-config-sync timer

- name: Install Hermes config sync timer
  ansible.builtin.template:
    src: hermes-config-sync.timer.j2
    dest: /etc/systemd/system/hermes-config-sync.timer
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-config-sync timer

- name: Install Hermes config watch service
  ansible.builtin.template:
    src: hermes-config-watch.service.j2
    dest: /etc/systemd/system/hermes-config-watch.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-config-watch

- name: Install Hermes config webhook service
  ansible.builtin.template:
    src: hermes-config-webhook.service.j2
    dest: /etc/systemd/system/hermes-config-webhook.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-config-webhook

- name: Synchronize live Hermes config repository
  ansible.builtin.command:
    cmd: "{{ hermes_config_git_sync_path }} --source ansible"
  register: hermes_config_sync
  changed_when: >-
    'cloned=true' in hermes_config_sync.stdout or
    'committed_local=true' in hermes_config_sync.stdout or
    'fast_forwarded=true' in hermes_config_sync.stdout or
    'pushed=true' in hermes_config_sync.stdout or
    'rebased=true' in hermes_config_sync.stdout or
    'apply_changed=true' in hermes_config_sync.stdout
  no_log: true

- name: Allow Hermes service to manage skills
  ansible.builtin.file:
    path: "{{ hermes_config_dir }}/skills"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    recurse: true

- name: Allow Hermes service to manage 1Password CLI config
  ansible.builtin.file:
    path: "{{ hermes_home }}/.config/op"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0700"

- name: Check Hermes 1Password CLI config file
  ansible.builtin.stat:
    path: "{{ hermes_home }}/.config/op/config"
    follow: false
  register: hermes_op_config_file

- name: Secure Hermes 1Password CLI config file
  ansible.builtin.file:
    path: "{{ hermes_home }}/.config/op/config"
    state: file
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0600"
    follow: false
  when: hermes_op_config_file.stat.exists

- name: Check Hermes config required skills and plugins
  ansible.builtin.shell: |
    set -euo pipefail
    test -f "{{ hermes_home }}/skills/security/1password/SKILL.md"
    test -f "{{ hermes_home }}/skills/newrrow-points-automation/SKILL.md"
    test -f "{{ hermes_home }}/skills/newrrow-points-automation/references/ui-flow.md"
    test -f "{{ hermes_home }}/plugins/newrrow-browser-login/plugin.yaml"
    test -f "{{ hermes_home }}/plugins/newrrow-browser-login/__init__.py"
  args:
    executable: /bin/bash
  changed_when: false

- name: Make Hermes config Newrrow login helper executable
  ansible.builtin.file:
    path: "{{ hermes_home }}/skills/newrrow-points-automation/scripts/newrrow-login.sh"
    state: file
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"

- name: Commit Hermes config deployment mutations
  ansible.builtin.command:
    cmd: "{{ hermes_config_git_sync_path }} --source ansible-post-install"
  register: hermes_config_post_install_sync
  changed_when: >-
    'committed_local=true' in hermes_config_post_install_sync.stdout or
    'pushed=true' in hermes_config_post_install_sync.stdout or
    'apply_changed=true' in hermes_config_post_install_sync.stdout
  no_log: true

- name: Check Hermes browser automation CLI
  ansible.builtin.stat:
    path: "{{ hermes_agent_dir }}/node_modules/.bin/agent-browser"
  register: hermes_agent_browser_cli

- name: Install Hermes browser automation Node dependencies
  ansible.builtin.command:
    cmd: npm ci --omit=dev --silent --workspaces=false
    chdir: "{{ hermes_agent_dir }}"
  when: hermes_agent_checkout.changed or not hermes_agent_browser_cli.stat.exists
  notify: Restart hermes-gateway

- name: Create Hermes local browser runtime directory
  ansible.builtin.file:
    path: "{{ hermes_browser_browsers_path }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    mode: "0755"

- name: Check Hermes local browser runtime
  ansible.builtin.find:
    paths: "{{ hermes_browser_browsers_path }}"
    patterns:
      - chrome-*
    file_type: directory
  register: hermes_local_browser_builds

- name: Install Hermes local browser runtime for private URL routing
  ansible.builtin.command:
    cmd: "{{ hermes_agent_dir }}/node_modules/.bin/agent-browser install --with-deps"
    chdir: "{{ hermes_agent_dir }}"
  environment:
    HOME: "{{ hermes_home }}"
  when: hermes_browser_auto_local_for_private_urls | bool and (hermes_agent_checkout.changed or not hermes_agent_browser_cli.stat.exists or hermes_local_browser_builds.matched | int == 0)
  notify: Restart hermes-gateway

- name: Allow Hermes service to manage local browser runtime
  ansible.builtin.file:
    path: "{{ hermes_browser_browsers_path }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    recurse: true

- name: Allow Hermes service to manage lazy venv deps
  ansible.builtin.file:
    path: "{{ hermes_venv_path }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_group }}"
    recurse: true


- name: Create Hermes 5+1 profile directories
  ansible.builtin.command:
    argv:
      - "{{ hermes_venv_path }}/bin/hermes"
      - profile
      - create
      - "{{ item.name }}"
      - --no-alias
      - --description
      - "{{ item.description }}"
    creates: "{{ hermes_home }}/profiles/{{ item.name }}"
  become: true
  become_user: "{{ hermes_user }}"
  environment:
    HERMES_HOME: "{{ hermes_home }}"
    HOME: "{{ hermes_home }}"
  loop: "{{ hermes_profiles }}"
  loop_control:
    label: "{{ item.name }}"

- name: Install Hermes runtime configuration helper
  ansible.builtin.template:
    src: hermes-configure-runtime.py.j2
    dest: "{{ hermes_install_dir }}/configure-runtime.py"
    owner: root
    group: root
    mode: "0755"

- name: Configure Hermes runtime settings
  ansible.builtin.command:
    cmd: "{{ hermes_venv_path }}/bin/python {{ hermes_install_dir }}/configure-runtime.py"
  register: hermes_runtime_config
  changed_when: hermes_runtime_config.stdout == "changed"
  notify: Restart hermes-gateway


- name: Initialize Hermes Kanban board
  ansible.builtin.command:
    argv:
      - "{{ hermes_venv_path }}/bin/hermes"
      - kanban
      - init
    creates: "{{ hermes_home }}/kanban.db"
  become: true
  become_user: "{{ hermes_user }}"
  environment:
    HERMES_HOME: "{{ hermes_home }}"
    HOME: "{{ hermes_home }}"

- name: Install Hermes gateway environment
  ansible.builtin.template:
    src: hermes-gateway.env.j2
    dest: "{{ hermes_env_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart hermes-gateway

- name: Install Hermes gateway systemd service
  ansible.builtin.template:
    src: hermes-gateway.service.j2
    dest: /etc/systemd/system/hermes-gateway.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-gateway

- name: Enable Hermes config synchronization services
  ansible.builtin.systemd:
    name: "{{ item }}"
    daemon_reload: true
    enabled: true
    state: started
  loop:
    - hermes-config-sync.timer
    - hermes-config-watch.service
    - hermes-config-webhook.service

- name: Enable Hermes gateway
  ansible.builtin.systemd:
    name: hermes-gateway.service
    daemon_reload: true
    enabled: true
    state: started
