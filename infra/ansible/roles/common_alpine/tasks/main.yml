---
- name: Install Alpine base packages
  community.general.apk:
    name: "{{ common_alpine_packages }}"
    update_cache: true
    state: present

- name: Set timezone
  ansible.builtin.copy:
    src: "/usr/share/zoneinfo/{{ homelab_timezone }}"
    dest: /etc/localtime
    remote_src: true
    mode: "0644"

- name: Persist timezone name
  ansible.builtin.copy:
    content: "{{ homelab_timezone }}\n"
    dest: /etc/timezone
    mode: "0644"

- name: Create service group
  ansible.builtin.group:
    name: "{{ service_group }}"
    gid: "{{ service_gid }}"
    state: present

- name: Create service user
  ansible.builtin.user:
    name: "{{ service_user }}"
    uid: "{{ service_uid }}"
    group: "{{ service_group }}"
    shell: /sbin/nologin
    create_home: false
    state: present

- name: Configure Alpine SSH hardening
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?{{ item.split()[0] }}\s+'
    line: "{{ item }}"
    validate: /usr/sbin/sshd -t -f %s
  loop:
    - PasswordAuthentication no
    - KbdInteractiveAuthentication no
    - ChallengeResponseAuthentication no
    - PermitRootLogin prohibit-password
  notify: Restart Alpine sshd
