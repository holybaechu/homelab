---
- name: Install VPN packages
  ansible.builtin.apt:
    name:
      - wireguard-tools
      - nftables
      - natpmpc
      - python3
      - ca-certificates
      - iputils-ping
      - openresolv
    update_cache: true
    state: present

- name: Install Proton WireGuard server selector
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../apps/downloads/scripts/proton_select_wireguard_server.py"
    dest: /usr/local/bin/proton-select-wireguard-server
    owner: root
    group: root
    mode: "0755"

- name: Select fastest Proton WireGuard server
  ansible.builtin.command:
    cmd: >-
      /usr/local/bin/proton-select-wireguard-server
      --servers-url {{ proton_server_list_url | quote }}
      --country {{ proton_server_country | quote }}
      --endpoint-port {{ proton_wireguard_endpoint_port | quote }}
      {{ '--port-forward-only' if proton_port_forward_only else '' }}
  register: proton_wireguard_selection_result
  changed_when: false

- name: Save selected Proton WireGuard server
  ansible.builtin.set_fact:
    proton_wireguard_selected: "{{ proton_wireguard_selection_result.stdout | from_json }}"

- name: Install WireGuard Proton config
  ansible.builtin.template:
    src: wg-proton.conf.j2
    dest: "/etc/wireguard/{{ proton_wg_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart wireguard

- name: Install nftables config
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart nftables

- name: Enable nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

- name: Enable WireGuard
  ansible.builtin.systemd:
    name: "wg-quick@{{ proton_wg_interface }}"
    enabled: true
    state: started

- name: Apply VPN configuration changes before starting qBittorrent
  ansible.builtin.meta: flush_handlers

- name: Check qBittorrent service units
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ item }}"
  loop:
    - qbittorrent.service
    - proton-natpmp-qbt.timer
  register: downloads_vpn_qbittorrent_units

- name: Start qBittorrent and NAT-PMP timer after VPN is up
  ansible.builtin.systemd:
    name: "{{ item.item }}"
    daemon_reload: true
    enabled: true
    state: started
  loop: "{{ downloads_vpn_qbittorrent_units.results }}"
  when: item.stat.exists
