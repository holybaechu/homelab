---
- name: Install Caddy build packages
  community.general.apk:
    name:
      - go
      - git
      - libcap
    update_cache: true
    state: present

- name: Install xcaddy
  ansible.builtin.command:
    cmd: "go install github.com/caddyserver/xcaddy/cmd/xcaddy@{{ xcaddy_version }}"
    creates: "/root/go/bin/xcaddy-{{ xcaddy_version }}.stamp"
  environment:
    GOSUMDB: sum.golang.org
    GONOSUMDB: ""

- name: Stamp xcaddy version
  ansible.builtin.copy:
    dest: "/root/go/bin/xcaddy-{{ xcaddy_version }}.stamp"
    content: "{{ xcaddy_version }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Set Caddy versioned build output path
  ansible.builtin.set_fact:
    caddy_build_output: >-
      /tmp/caddy-{{ caddy_version }}-{{ caddy_cloudflare_module | regex_replace('[^A-Za-z0-9_.-]', '_') }}

- name: Build Caddy with Cloudflare DNS module
  ansible.builtin.command:
    cmd: "/root/go/bin/xcaddy build {{ caddy_version }} --with {{ caddy_cloudflare_module }} --output {{ caddy_build_output }}"
    chdir: /tmp
    creates: "{{ caddy_build_output }}"
  environment:
    GOSUMDB: sum.golang.org
    GONOSUMDB: ""

- name: Install Caddy binary
  ansible.builtin.copy:
    src: "{{ caddy_build_output }}"
    dest: /usr/local/bin/caddy
    remote_src: true
    mode: "0755"
  notify: Restart caddy

- name: Allow Caddy to bind privileged ports
  ansible.builtin.command:
    cmd: setcap cap_net_bind_service=+ep /usr/local/bin/caddy
  changed_when: false

- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0750"
  loop:
    - "{{ caddy_config_dir }}"
    - "{{ caddy_data_dir }}"


- name: Read Proxmox root CA for verified upstream TLS
  ansible.builtin.slurp:
    src: /etc/pve/pve-root-ca.pem
  delegate_to: "{{ groups['pve_hosts'][0] }}"
  run_once: true
  register: caddy_pve_root_ca

- name: Install Proxmox root CA for Caddy upstream TLS verification
  ansible.builtin.copy:
    content: "{{ caddy_pve_root_ca.content | b64decode }}"
    dest: /etc/ssl/certs/homelab-pve-root-ca.pem
    owner: root
    group: root
    mode: "0644"
  notify: Reload caddy

- name: Install Caddyfile
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../apps/edge/Caddyfile"
    dest: "{{ caddy_config_path }}"
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0640"
  notify: Reload caddy

- name: Install Caddy environment
  ansible.builtin.template:
    src: caddy.env.j2
    dest: "{{ caddy_env_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart caddy

- name: Install Caddy OpenRC service
  ansible.builtin.template:
    src: caddy.openrc.j2
    dest: /etc/init.d/caddy
    mode: "0755"
  notify: Restart caddy

- name: Enable Caddy
  ansible.builtin.service:
    name: caddy
    enabled: true
    state: started
