---
- name: Install Copyparty dependencies
  community.general.apk:
    name:
      - python3
      - py3-pip
      - py3-virtualenv
      - ffmpeg
    update_cache: true
    state: present

- name: Create Copyparty directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0750"
  loop:
    - /etc/copyparty
    - "{{ copyparty_state_dir }}"

- name: Check Copyparty data mounts
  ansible.builtin.stat:
    path: "{{ item }}"
  register: copyparty_data_mounts
  loop:
    - /srv/public
    - /srv/shared-readonly
    - /srv/music
    - /srv/bjh_deepfake_contest
    - "{{ copyparty_downloads_path }}"

- name: Assert Copyparty data mounts exist
  ansible.builtin.assert:
    that:
      - item.stat.isdir
    fail_msg: "{{ item.item }} must be mounted before configuring Copyparty"
  loop: "{{ copyparty_data_mounts.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Assert Copyparty user secrets are supplied
  ansible.builtin.assert:
    that:
      - copyparty_users is defined
      - copyparty_users | length > 0
    fail_msg: "Set copyparty_users before starting Copyparty; the config references named users."

- name: Create Copyparty virtualenv
  ansible.builtin.command:
    cmd: python3 -m venv /opt/copyparty
    creates: /opt/copyparty/bin/python

- name: Install Copyparty
  ansible.builtin.pip:
    name: copyparty==1.20.16
    virtualenv: /opt/copyparty
    state: present

- name: Install Copyparty config
  ansible.builtin.template:
    src: copyparty.conf.j2
    dest: "{{ copyparty_config_path }}"
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0640"
  no_log: true
  notify: Restart copyparty

- name: Install Copyparty OpenRC service
  ansible.builtin.template:
    src: copyparty.openrc.j2
    dest: /etc/init.d/copyparty
    mode: "0755"
  notify: Restart copyparty

- name: Enable Copyparty
  ansible.builtin.service:
    name: copyparty
    enabled: true
    state: started
