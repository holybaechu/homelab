---
- name: Install qBittorrent
  ansible.builtin.apt:
    name:
      - qbittorrent-nox
      - ca-certificates
      - python3
      - unzip
    update_cache: true
    state: present

- name: Create qBittorrent group
  ansible.builtin.group:
    name: "{{ qbittorrent_group }}"
    gid: "{{ qbittorrent_gid }}"
    state: present

- name: Create qBittorrent user
  ansible.builtin.user:
    name: "{{ qbittorrent_user }}"
    uid: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_group }}"
    shell: /usr/sbin/nologin
    create_home: true
    home: /var/lib/qbittorrent
    state: present

- name: Create download directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ qbittorrent_user }}"
    group: "{{ qbittorrent_group }}"
    mode: "0775"
  loop:
    - "{{ downloads_mount_path }}"
    - "{{ downloads_complete_path }}"
    - "{{ downloads_incomplete_path }}"

- name: Create qBittorrent config directory
  ansible.builtin.file:
    path: /var/lib/qbittorrent/.config/qBittorrent
    state: directory
    owner: "{{ qbittorrent_user }}"
    group: "{{ qbittorrent_group }}"
    mode: "0700"

- name: Create VueTorrent release directory
  ansible.builtin.file:
    path: "{{ qbittorrent_vuetorrent_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check VueTorrent version marker
  ansible.builtin.stat:
    path: "{{ qbittorrent_vuetorrent_root }}/.vuetorrent-{{ qbittorrent_vuetorrent_version }}.installed"
  register: qbittorrent_vuetorrent_marker

- name: Download VueTorrent
  ansible.builtin.get_url:
    url: "{{ qbittorrent_vuetorrent_release_url }}"
    dest: "/tmp/vuetorrent-{{ qbittorrent_vuetorrent_version }}.zip"
    checksum: "sha256:{{ qbittorrent_vuetorrent_sha256 }}"
    owner: root
    group: root
    mode: "0644"
  when: not qbittorrent_vuetorrent_marker.stat.exists

- name: Install VueTorrent
  ansible.builtin.shell: |
    set -eu
    tmp="$(mktemp -d)"
    trap 'rm -rf "${tmp}"' EXIT
    rm -rf "{{ qbittorrent_vuetorrent_root }}"
    mkdir -p "{{ qbittorrent_vuetorrent_root }}"
    unzip -q "/tmp/vuetorrent-{{ qbittorrent_vuetorrent_version }}.zip" -d "${tmp}"
    cp -a "${tmp}/vuetorrent/." "{{ qbittorrent_vuetorrent_root }}/"
    touch "{{ qbittorrent_vuetorrent_root }}/.vuetorrent-{{ qbittorrent_vuetorrent_version }}.installed"
    chown -R root:root "{{ qbittorrent_vuetorrent_root }}"
    chmod -R u=rwX,go=rX "{{ qbittorrent_vuetorrent_root }}"
  args:
    executable: /bin/sh
  when: not qbittorrent_vuetorrent_marker.stat.exists
  changed_when: true
  notify: Restart qbittorrent

- name: Point qBittorrent at current VueTorrent release
  ansible.builtin.file:
    src: "{{ qbittorrent_vuetorrent_root }}"
    dest: "{{ qbittorrent_vuetorrent_root_current }}"
    state: link
    force: true
  notify: Restart qbittorrent

- name: Generate qBittorrent Web UI password hash
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import base64, hashlib, sys
        password = sys.argv[1].encode()
        salt = hashlib.sha256(password + b":qbittorrent-webui").digest()[:16]
        digest = hashlib.pbkdf2_hmac("sha512", password, salt, 100000)
        print("@ByteArray(%s:%s)" % (
            base64.b64encode(salt).decode(),
            base64.b64encode(digest).decode(),
        ))
      - "{{ qbittorrent_webui_password }}"
  changed_when: false
  no_log: true
  register: qbittorrent_webui_password_pbkdf2_result

- name: Set qBittorrent Web UI password hash fact
  ansible.builtin.set_fact:
    qbittorrent_webui_password_pbkdf2: "{{ qbittorrent_webui_password_pbkdf2_result.stdout }}"
  no_log: true

- name: Render qBittorrent config candidate
  ansible.builtin.template:
    src: qBittorrent.conf.j2
    dest: /tmp/qBittorrent.conf.candidate
    owner: "{{ qbittorrent_user }}"
    group: "{{ qbittorrent_group }}"
    mode: "0600"
  changed_when: false
  no_log: true

- name: Compare qBittorrent config candidate
  ansible.builtin.shell: |
    set -eu
    test -f /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf \
      && cmp -s /tmp/qBittorrent.conf.candidate /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf
  args:
    executable: /bin/sh
  register: qbittorrent_config_compare
  failed_when: qbittorrent_config_compare.rc not in [0, 1]
  changed_when: false
  no_log: true

- name: Gather service facts before qBittorrent config update
  ansible.builtin.service_facts:

- name: Stop qBittorrent before applying changed config
  ansible.builtin.systemd:
    name: qbittorrent.service
    state: stopped
  when:
    - qbittorrent_config_compare.rc != 0
    - "'qbittorrent.service' in ansible_facts.services"

- name: Install qBittorrent config
  ansible.builtin.copy:
    src: /tmp/qBittorrent.conf.candidate
    dest: /var/lib/qbittorrent/.config/qBittorrent/qBittorrent.conf
    remote_src: true
    owner: "{{ qbittorrent_user }}"
    group: "{{ qbittorrent_group }}"
    mode: "0600"
  when: qbittorrent_config_compare.rc != 0
  no_log: true
  notify: Restart qbittorrent

- name: Install NAT-PMP updater
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../apps/downloads/scripts/proton_natpmp_qbt.py"
    dest: /usr/local/bin/proton-natpmp-qbt
    owner: root
    group: root
    mode: "0755"

- name: Install NAT-PMP environment
  ansible.builtin.copy:
    dest: "{{ qbittorrent_natpmp_env_path }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      QBITTORRENT_PASSWORD={{ qbittorrent_webui_password | quote }}
  no_log: true

- name: Install NAT-PMP systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/proton-natpmp-qbt.service
    mode: "0644"
    content: |
      [Unit]
      Description=Refresh Proton VPN NAT-PMP port and update qBittorrent
      After=qbittorrent.service wg-quick@{{ proton_wg_interface }}.service
      Requires=qbittorrent.service wg-quick@{{ proton_wg_interface }}.service

      [Service]
      Type=oneshot
      EnvironmentFile={{ qbittorrent_natpmp_env_path }}
      ExecStart=/usr/local/bin/proton-natpmp-qbt --gateway {{ proton_natpmp_gateway }} --qbt-url http://127.0.0.1:{{ qbittorrent_webui_port }} --qbt-user {{ qbittorrent_webui_username }}

- name: Install NAT-PMP timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/proton-natpmp-qbt.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run Proton NAT-PMP qBittorrent updater every 45 seconds

      [Timer]
      OnBootSec=30
      OnUnitActiveSec=45
      AccuracySec=1

      [Install]
      WantedBy=timers.target

- name: Install qBittorrent service
  ansible.builtin.template:
    src: qbittorrent.service.j2
    dest: /etc/systemd/system/qbittorrent.service
    mode: "0644"
  notify: Restart qbittorrent

- name: Enable qBittorrent and NAT-PMP timer
  ansible.builtin.systemd:
    name: "{{ item }}"
    daemon_reload: true
    enabled: true
    state: started
  loop:
    - qbittorrent.service
    - proton-natpmp-qbt.timer
