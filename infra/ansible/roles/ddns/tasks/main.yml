---
- name: Install DDNS script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../apps/edge/ddns/update-cloudflare-ddns.sh"
    dest: /usr/local/bin/update-cloudflare-ddns
    owner: root
    group: root
    mode: "0700"
  notify: Restart cloudflare-ddns

- name: Install DDNS loop
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/openrc-loop.sh.j2"
    dest: /usr/local/bin/cloudflare-ddns-loop
    owner: root
    group: root
    mode: "0700"
  vars:
    loop_environment:
      - name: CLOUDFLARE_ZONE_ID
        value: "{{ cloudflare_zone_id }}"
      - name: CLOUDFLARE_DDNS_TOKEN
        value: "{{ cloudflare_ddns_token }}"
      - name: DDNS_RECORD_NAMES
        value: "{{ ddns_record_names | join(' ') }}"
    loop_command: /usr/local/bin/update-cloudflare-ddns
    loop_failure_message: "Cloudflare DDNS update failed; retrying"
    loop_interval_seconds: "{{ ddns_interval_seconds }}"
  no_log: true
  notify: Restart cloudflare-ddns

- name: Install DDNS OpenRC service
  ansible.builtin.template:
    src: ddns.openrc.j2
    dest: /etc/init.d/cloudflare-ddns
    mode: "0755"
  notify: Restart cloudflare-ddns

- name: Enable DDNS
  ansible.builtin.service:
    name: cloudflare-ddns
    enabled: true
    state: started
