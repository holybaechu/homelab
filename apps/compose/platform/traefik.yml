api:
  dashboard: false

ping: {}

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: homelab_proxy
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      email: holybaechu@proton.me
      storage: /data/acme.json
      dnsChallenge:
        provider: cloudflare

log:
  level: INFO

accessLog: {}
