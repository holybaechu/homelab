name: media

services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: .env
    environment:
      VPN_PORT_FORWARDING: "on"
      PORT_FORWARD_ONLY: "on"
      HEALTH_SMALL_CHECK_TYPE: dns
      HEALTH_TARGET_ADDRESSES: "cloudflare.com:443,github.com:443"
      FIREWALL_INPUT_PORTS: "8080"
      FIREWALL_OUTBOUND_SUBNETS: "192.168.0.0/24,100.64.0.0/10"
      VPN_PORT_FORWARDING_UP_COMMAND: >-
        /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data
        "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}"
        http://127.0.0.1:8080/api/v2/app/setPreferences'
      VPN_PORT_FORWARDING_DOWN_COMMAND: >-
        /bin/sh -c 'wget -O- -nv --retry-connrefused --post-data
        "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}"
        http://127.0.0.1:8080/api/v2/app/setPreferences'
    volumes:
      - gluetun_data:/gluetun
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=homelab_proxy
      - traefik.http.routers.qbt.rule=Host(`qbt.home.hchu.me`)
      - traefik.http.routers.qbt.entrypoints=websecure
      - traefik.http.routers.qbt.middlewares=private-only@file,secure-headers@file
      - traefik.http.services.qbt.loadbalancer.server.port=8080

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:20.04.1
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    env_file: .env
    environment:
      WEBUI_PORT: "8080"
    volumes:
      - /srv/homelab/docker-apps/qbittorrent:/config:rw
      - /srv/homelab/downloads:/downloads:rw
      - /srv/homelab/copyparty/public:/public:rw

  copyparty:
    image: copyparty/ac:1.20.18
    restart: unless-stopped
    env_file: .env
    command: ["-c", "/config/copyparty.conf"]
    volumes:
      - ./copyparty.conf:/config/copyparty.conf:ro
      - /srv/homelab/docker-apps/copyparty:/config/state:rw
      - /srv/homelab/copyparty/public:/srv/public:rw
      - /srv/homelab/copyparty/shared-readonly:/srv/shared-readonly:ro
      - /srv/homelab/downloads/complete:/srv/downloads:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=homelab_proxy
      - traefik.http.routers.copyparty.rule=Host(`copyparty.hchu.me`)
      - traefik.http.routers.copyparty.entrypoints=websecure
      - traefik.http.routers.copyparty.middlewares=secure-headers@file
      - traefik.http.services.copyparty.loadbalancer.server.port=3923

networks:
  proxy:
    external: true
    name: homelab_proxy

volumes:
  gluetun_data:
    name: homelab_gluetun_data
