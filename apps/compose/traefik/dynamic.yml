http:
  middlewares:
    private-only:
      ipAllowList:
        sourceRange:
          - 192.168.0.0/24
          - 100.64.0.0/10
    secure-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        referrerPolicy: no-referrer-when-downgrade
        contentTypeNosniff: true
        customFrameOptionsValue: DENY
    pve-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        referrerPolicy: no-referrer-when-downgrade
        customFrameOptionsValue: SAMEORIGIN
    router-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        referrerPolicy: no-referrer-when-downgrade
        customFrameOptionsValue: DENY

  routers:
    hermes-config-webhook:
      rule: Host(`hermes-config-webhook.hchu.me`)
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [secure-headers]
      service: hermes-config-webhook
    adguard:
      rule: Host(`adguard.home.hchu.me`)
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [private-only, secure-headers]
      service: adguard
    pve:
      rule: Host(`pve.home.hchu.me`)
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [private-only, pve-headers]
      service: pve
    router:
      rule: Host(`router.home.hchu.me`)
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [private-only, router-headers]
      service: router

  services:
    hermes-config-webhook:
      loadBalancer:
        servers:
          - url: http://192.168.0.9:8787
    adguard:
      loadBalancer:
        serversTransport: adguard-transport
        servers:
          - url: https://192.168.0.3:443
    pve:
      loadBalancer:
        serversTransport: pve-transport
        servers:
          - url: https://192.168.0.2:8006
    router:
      loadBalancer:
        servers:
          - url: http://192.168.0.1

  serversTransports:
    adguard-transport:
      serverName: adguard.home.hchu.me
    pve-transport:
      serverName: pve.home.hchu.me
      rootCAs:
        - /etc/ssl/certs/homelab-pve-root-ca.pem
